                <button id="goStage3" class="success">3단계로 이동</button>
              </div>
            </div>
          `;
          $("restartStage2All").addEventListener("click", restartStage2All);
          $("restartStage2Weak").addEventListener("click", restartStage2WeakOnly);
          $("goStage3").addEventListener("click", () => startStage3());
          return;
        }
      }

      state.stage2Current = state.stage2Queue.shift();
      state.stage2Locked = false;
      state.stage2StartedAt = Date.now();
      const word = state.words.find((item) => item.id === state.stage2Current);
      const missLabel = getStage2MissLabel(word);
      const missBadge = missLabel ? `<div class="miss-badge">${missLabel}</div>` : "";
      $("stage2Content").innerHTML = `
        <div class="question-box">
          ${missBadge}
          <div class="korean-large">${escapeHtml(word.korean)}</div>
          <div id="stage2PromptControls" class="stack">
            <div class="timer-note">빠르게 떠올리면 한 번에 통과</div>
            <div class="answer-line">
              <input id="stage2Answer" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="English answer">
              <button id="stage2Check">확인</button>
            </div>
          </div>
          <div id="stage2Feedback" class="feedback" hidden></div>
        </div>
      `;
      $("stage2Answer").focus();
      $("stage2Check").addEventListener("click", checkStage2Answer);
      $("stage2Answer").addEventListener("keydown", (event) => {
        if (event.key === "Enter") checkStage2Answer();
      });
    }

    function getStage2SpellingPracticeHtml(word, title = "스펠링 조각 먼저 따라쓰기", status = "조각을 맞게 쓰면 전체 단어 입력이 열려요.", showChunks = true, indexes = null, showAllRows = false) {
      const chunks = getSpellingChunks(word);
      const editableIndexes = getSelectedChunkIndexes(word, indexes);
      const editableSet = new Set(editableIndexes);
      const displayIndexes = showAllRows ? chunks.map((_, index) => index) : editableIndexes;
      const displayChunks = displayIndexes.map((index) => ({ ...chunks[index], originalIndex: index }));
      if (!displayChunks.length || !editableIndexes.length) return "";
      return `
        <div class="spelling-practice" id="stage2SpellingPractice">
          <div class="spelling-title">${escapeHtml(title)}</div>
          ${displayChunks.map((item) => {
            const isEditable = editableSet.has(item.originalIndex);
            const chunkDisplay = showChunks || !isEditable
              ? `<span class="chunk-text">${escapeHtml(item.chunk)}</span>`
              : `<span class="chunk-mask">가림</span>`;
            const inputOrLocked = isEditable
              ? `<input class="chunk-copy-input" data-index="${item.originalIndex}" data-answer="${escapeHtml(item.chunk)}" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="${showChunks ? `${escapeHtml(item.chunk)} 따라쓰기` : "스펠링 쓰기"}">`
              : `<span class="chunk-locked">통과</span>`;
            return `
            <div class="spelling-practice-row ${showChunks ? "" : "recall"} ${isEditable ? "" : "locked"}">
              <span class="sound-label">${escapeHtml(item.sound)}</span>
              ${chunkDisplay}
              <button class="ghost speaker-btn chunk-speaker" type="button" data-sound="${escapeHtml(item.sound)}" aria-label="${escapeHtml(item.sound)} 듣기">🔊</button>
              ${inputOrLocked}
            </div>
          `;
          }).join("")}
          <button id="checkSpellingChunks" class="ghost" type="button">조각 따라쓰기 확인</button>
          <div id="spellingChunkStatus" class="spelling-status">${escapeHtml(status)}</div>
        </div>
      `;
    }

    function getSelectedChunkIndexes(word, indexes = null) {
      const chunks = getSpellingChunks(word);
      if (!Array.isArray(indexes) || !indexes.length) return chunks.map((_, index) => index);
      return [...new Set(indexes.map((index) => Number(index)))]
        .filter((index) => Number.isInteger(index) && index >= 0 && index < chunks.length);
    }

    function normalizeSpellingText(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function getWrongSpellingChunkIndexes(word, answer) {
      const chunks = getSpellingChunks(word);
      if (!chunks.length) return [];
      const normalizedAnswer = normalizeSpellingText(answer);
      if (!normalizedAnswer) return chunks.map((_, index) => index);

      let cursor = 0;
      const wrongIndexes = [];
      const answerParts = [];
      const correctParts = [];
      chunks.forEach((item, index) => {
        const correct = normalizeSpellingText(item.chunk);
        correctParts.push(correct);
        const answerPart = normalizedAnswer.slice(cursor, cursor + correct.length);
        answerParts.push(answerPart);
        if (answerPart !== correct) wrongIndexes.push(index);
        cursor += correct.length;
      });
      if (cursor < normalizedAnswer.length && wrongIndexes.length) return focusLikelyTroubleChunk(wrongIndexes, answerParts, correctParts, normalizedAnswer);
      if (cursor < normalizedAnswer.length) wrongIndexes.push(chunks.length - 1);
      return wrongIndexes.length ? focusLikelyTroubleChunk(wrongIndexes, answerParts, correctParts, normalizedAnswer) : [];
    }

    function focusLikelyTroubleChunk(wrongIndexes, answerParts, correctParts, normalizedAnswer) {
      const correctWord = correctParts.join("");
      if (normalizedAnswer.length !== correctWord.length || wrongIndexes.length <= 1) {
        return wrongIndexes;
      }

      const focused = [];
      let group = [];
      const flushGroup = () => {
        if (!group.length) return;
        const canFocusLast = group.length > 1 && group[0] > 0 && group.slice(0, -1).every((index) => {
          const answerPart = answerParts[index] || "";
          const correctPart = correctParts[index] || "";
          return answerPart.charAt(0) && answerPart.charAt(0) === correctPart.charAt(0);
        });
        if (canFocusLast) focused.push(group[group.length - 1]);
        else focused.push(...group);
        group = [];
      };

      wrongIndexes.forEach((index) => {
        if (!group.length || index === group[group.length - 1] + 1) {
          group.push(index);
        } else {
          flushGroup();
          group.push(index);
        }
      });
      flushGroup();
      return [...new Set(focused)];
    }

    function setupStage2SpellingPractice(options = {}) {
      const settings = {
        answerInputId: "stage2Answer",
        answerButtonId: "stage2Check",
        successText: "좋아요. 이제 전체 단어를 가리고 써보세요.",
        onComplete: null,
        ...options
      };
      const inputs = [...document.querySelectorAll(".chunk-copy-input")];
      const status = $("spellingChunkStatus");
      document.querySelectorAll("#stage2Content .chunk-speaker").forEach((button) => {
        button.addEventListener("click", () => speakSpellingChunk(button.dataset.sound || ""));
      });
      if (!canSpeak()) {
        document.querySelectorAll("#stage2Content .chunk-speaker").forEach((button) => {
          button.disabled = true;
        });
      }
      inputs.forEach((input, index) => {
        blockPasteInput(input, status);
        input.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;
          event.preventDefault();
          const nextInput = inputs[index + 1];
          if (nextInput) nextInput.focus();
          else checkStage2SpellingChunks(settings);
        });
      });
      $("checkSpellingChunks").addEventListener("click", () => checkStage2SpellingChunks(settings));
      if (inputs[0]) inputs[0].focus();
    }

    function checkStage2SpellingChunks(settings = {}) {
      const options = {
        answerInputId: "stage2Answer",
        answerButtonId: "stage2Check",
        successText: "좋아요. 이제 전체 단어를 가리고 써보세요.",
        onComplete: null,
        ...settings
      };
      const inputs = [...document.querySelectorAll(".chunk-copy-input")];
      const status = $("spellingChunkStatus");
      const firstWrong = inputs.find((input) => input.value.trim().toLowerCase() !== input.dataset.answer.toLowerCase());
      if (firstWrong) {
        if (status) {
          status.hidden = false;
          status.textContent = "틀린 조각이 있어요. 입력칸이 열린 조각만 다시 써보세요.";
          status.style.color = "#b42318";
        }
        firstWrong.focus();
        firstWrong.select();
        return;
      }
      inputs.forEach((input) => {
        input.disabled = true;
      });
      const checkButton = $("checkSpellingChunks");
      if (checkButton) checkButton.disabled = true;
      if (typeof options.onComplete === "function") {
        options.onComplete();
        return;
      }
      const answerInput = $(options.answerInputId);
      const answerButton = $(options.answerButtonId);
      if (!answerInput || !answerButton) return;
      answerInput.disabled = false;
      answerButton.disabled = false;
      if (status) {
        status.textContent = options.successText;
        status.style.color = "var(--green)";
      }
      state.stage2StartedAt = Date.now();
      answerInput.focus();
    }

    function checkStage2Answer() {
      if (state.stage2Locked) return;
      const word = state.words.find((item) => item.id === state.stage2Current);
      const answer = $("stage2Answer").value.trim().toLowerCase();
      const feedback = $("stage2Feedback");
      const isFastAnswer = Date.now() - state.stage2StartedAt <= 10000;
      state.stage2Locked = true;
      $("stage2Check").disabled = true;
      $("stage2Answer").disabled = true;

      if (answer === word.english) {
        word.stage2Count = isFastAnswer ? 2 : word.stage2Count + 1;
        if (word.stage2Count >= 2) word.stage2Pass = true;
        feedback.hidden = false;
        feedback.className = "feedback ok";
        feedback.textContent = isFastAnswer ? "✅ 한번에 통과!" : word.stage2Pass ? "✅ 통과!" : "✅ 한번만 더 맞히자!";
        saveData();
        setTimeout(() => nextStage2Word(state.stage2AutoAdvance), 750);
      } else {
        word.stage2Count = 0;
        word.stage2Pass = false;
        word.stage2Missed = true;
        word.stage2MissCount = Number(word.stage2MissCount || 0) + 1;
        word.stage2ReviewNeeded = true;
        if (answer) word.stage2LastWrongAnswer = answer;
        state.stage2Queue.push(word.id);
        const promptControls = $("stage2PromptControls");
        if (promptControls) promptControls.hidden = true;
        feedback.hidden = false;
        feedback.className = "feedback bad";
        const wrongChunkIndexes = getWrongSpellingChunkIndexes(word, answer);
        addSpellingTroubles(word, wrongChunkIndexes);
        const spellingPractice = getStage2SpellingPracticeHtml(
          word,
          "1단계: 보고 따라쓰기",
          "맞은 조각은 통과로 두고, 틀린 조각만 다시 써보세요.",
          true,
          wrongChunkIndexes,
          true
        );
        const needsSpellingPractice = Boolean(spellingPractice);
        if (needsSpellingPractice) {
          feedback.innerHTML = `
            <span>❌ 스펠링을 쪼개서 다시 잡아볼게요.</span>
            ${spellingPractice}
          `;
        } else {
          renderStage2WholeCopy(word);
        }
        saveData();
        if (needsSpellingPractice) {
          setupStage2SpellingPractice({
            onComplete: () => renderStage2ChunkRecall(word, wrongChunkIndexes)
          });
        }
      }
    }

    function renderStage2ChunkRecall(word, indexes = null, onComplete = null) {
      const feedback = $("stage2Feedback");
      feedback.className = "feedback bad";
      feedback.innerHTML = `
        <span>좋아요. 이제 스펠링을 가리고, 소리만 보고 조각을 써보세요.</span>
        ${getStage2SpellingPracticeHtml(
          word,
          "2단계: 소리만 보고 조각 쓰기",
          "맞은 조각은 보여주고, 헷갈린 조각만 가린 채 다시 써보세요.",
          false,
          indexes,
          true
        )}
      `;
      setupStage2SpellingPractice({
        onComplete: () => {
          if (typeof onComplete === "function") {
            onComplete();
          } else {
            renderStage2WholeCopy(word);
          }
        }
      });
    }

    function renderStage2WholeCopy(word) {
      const feedback = $("stage2Feedback");
      feedback.className = "feedback bad";
      feedback.innerHTML = `
        <span>3단계: 이제 전체 단어를 한 번 써보세요.</span>
        <div class="answer-line" style="width:100%;">
          <input id="stage2CopyAnswer" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="전체 단어 쓰기">
          <button id="stage2CopyCheck" class="danger">전체 단어 확인</button>
        </div>
        <div id="stage2CopyNotice" class="copy-feedback" hidden>붙여넣기 없이 직접 써보세요.</div>
      `;
      blockPasteInput($("stage2CopyAnswer"), $("stage2CopyNotice"));
      $("stage2CopyAnswer").focus();
      $("stage2CopyCheck").addEventListener("click", () => checkStage2CopyAnswer(word));
      $("stage2CopyAnswer").addEventListener("keydown", (event) => {
        if (event.key === "Enter") checkStage2CopyAnswer(word);
      });
    }

    function checkStage2CopyAnswer(word) {
      const copyInput = $("stage2CopyAnswer");
      const copyButton = $("stage2CopyCheck");
      const feedback = $("stage2Feedback");
      if (!copyInput || !copyButton || !word) return;
      if (copyInput.value.trim().toLowerCase() !== word.english) {
        const wrongIndexes = getWrongSpellingChunkIndexes(word, copyInput.value);
        addSpellingTroubles(word, wrongIndexes);
        saveData();
        if (wrongIndexes.length) {
          renderStage2ChunkRecall(word, wrongIndexes, () => {
            clearSpellingTroubles(word, wrongIndexes);
            saveData();
            feedback.className = "feedback ok";
            feedback.innerHTML = `<span>✅ 헷갈린 부분을 다시 잡았어요. 다음 단어로 가요.</span>`;
            setTimeout(() => nextStage2Word(state.stage2AutoAdvance), 650);
          });
        } else {
          feedback.className = "feedback bad";
          copyInput.focus();
          copyInput.select();
        }
        return;
      }
      clearSpellingTroubles(word, getSelectedChunkIndexes(word));
      copyInput.disabled = true;
      copyButton.disabled = true;
      feedback.className = "feedback ok";
      feedback.innerHTML = `<span>✅ 잘 썼어요. 다음 단어로 가요.</span>`;
      setTimeout(() => nextStage2Word(state.stage2AutoAdvance), 650);
    }

    function startStage3(limitIds = null, scopeLabel = "") {
      state.progress.currentStage = 3;
      state.stage3LimitIds = Array.isArray(limitIds) ? [...limitIds] : null;
      state.stage3ScopeLabel = scopeLabel || "";
      saveData();
      renderStage3();
      showScreen("stage3Screen");
    }

    function getStage3Words() {
      return wordsForLimit(state.stage3LimitIds);
    }

    function renderStage3(graded = false, results = null, answers = {}) {
      const words = getStage3Words();
      const isMiniTest = Boolean(state.stage3LimitIds);
      updateStageNavButtons();
      const scope = state.stage3ScopeLabel ? `${state.stage3ScopeLabel} · ` : isMiniTest ? "오답 미니 테스트 · " : "";
      $("stage3Meta").textContent = `${formatDayLabel(state.progress.currentDay)} · ${scope}${words.length}단어`;
      renderStageBar("stage3Bar", 3);
      $("stage3Content").innerHTML = `
        <div class="panel stack">
          <div id="stage3Score"></div>
          <div class="test-list">
            ${words.map((word, index) => {
              const result = results ? results[word.id] : null;
              const rowClass = result === true ? "correct" : result === false ? "wrong" : "";
              return `
                <div class="test-row ${rowClass}" data-id="${word.id}">
                  <div class="num">${index + 1}</div>
                  <div class="test-korean">${escapeHtml(word.korean)}</div>
                  <div>
                    <input class="stage3-answer" data-id="${word.id}" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" value="${escapeHtml(answers[word.id] || "")}" ${graded ? "disabled" : ""}>
                    ${result === false ? `<div class="correct-answer">내 답: ${escapeHtml(answers[word.id] || "빈칸")} · 정답: ${escapeHtml(word.english)}</div>` : ""}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
          <div id="stage3Actions" class="actions">
            ${graded ? "" : `<button id="gradeBtn" class="success">채점하기</button>`}
          </div>
        </div>
      `;

      if (!graded) {
        $("gradeBtn").addEventListener("click", gradeStage3);
        const firstInput = document.querySelector(".stage3-answer");
        if (firstInput) firstInput.focus();
      }
    }

    function gradeStage3() {
      const words = getStage3Words();
      const isMiniTest = Boolean(state.stage3LimitIds);
      const answers = [...document.querySelectorAll(".stage3-answer")].reduce((map, input) => {
        map[input.dataset.id] = input.value.trim().toLowerCase();
        return map;
      }, {});
      const results = {};
      const wrongIds = [];
      words.forEach((word) => {
        const ok = answers[word.id] === word.english;
        results[word.id] = ok;
        state.progress.stage3Results[word.id] = ok;
        if (!ok) {
          wrongIds.push(word.id);
          word.stage2ReviewNeeded = true;
          if (answers[word.id]) word.stage2LastWrongAnswer = answers[word.id];
        }
      });
      if (!wrongIds.length) {
        words.forEach((word) => {
          word.stage2ReviewNeeded = false;
        });
      }
      saveData();
      renderStage3(true, results, answers);

      const score = words.length - wrongIds.length;
      $("stage3Score").innerHTML = `
        <div class="question-box">
          <div class="score">${score}/${words.length}</div>
          <p class="muted">${score === words.length ? (isMiniTest ? "🎉 오답 정복 완료!" : "🎉 100점 완성!") : "틀린 단어를 바로잡고 다시 확인해요."}</p>
        </div>
      `;

      if (score === words.length) {
        $("stage3Actions").innerHTML = `
          <button id="finishHome" class="success">홈으로</button>
          ${isMiniTest ? `<button id="fullStage3Again" class="ghost">전체 3단계 보기</button>` : ""}
        `;
        $("finishHome").addEventListener("click", renderHome);
        if (isMiniTest) $("fullStage3Again").addEventListener("click", () => startStage3());
      } else {
        const wrongWords = wrongIds.map((id) => state.words.find((word) => word.id === id));
        $("stage3Actions").innerHTML = `
          <div class="panel stack" style="box-shadow:none; width:100%;">
            <h3>틀린 단어</h3>
            <p class="muted">정답을 한 번 따라쓴 뒤, 이 단어들만 2단계로 다시 연습해요. 2단계가 끝나면 오답 미니 테스트로 바로 확인합니다.</p>
            <div class="word-list">
              ${wrongWords.map((word) => `
                <div class="word-row correction-row">
                  <strong>${escapeHtml(word.korean)}</strong>
                  <span>${escapeHtml(word.english)}</span>
                  <input class="stage3-copy" data-id="${word.id}" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="정답 따라쓰기">
                </div>
              `).join("")}
            </div>
            <div id="stage3CopyFeedback" class="copy-feedback" hidden></div>
            <button id="retryWrong" class="danger">따라쓰고 2단계로 다시</button>
          </div>
        `;
        $("retryWrong").addEventListener("click", () => retryStage3WrongWords(wrongIds));
        document.querySelectorAll(".stage3-copy").forEach((input) => {
          blockPasteInput(input, $("stage3CopyFeedback"));
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") retryStage3WrongWords(wrongIds);
          });
        });
        const firstCopy = document.querySelector(".stage3-copy");
        if (firstCopy) firstCopy.focus();
      }
    }

    function retryStage3WrongWords(wrongIds) {
      const feedback = $("stage3CopyFeedback");
      const firstWrongInput = wrongIds
        .map((id) => {
          const word = state.words.find((item) => item.id === id);
          const input = document.querySelector(`.stage3-copy[data-id="${id}"]`);
          return input && input.value.trim().toLowerCase() === word.english ? null : input;
        })
        .find(Boolean);

      if (firstWrongInput) {
        if (feedback) {
          feedback.hidden = false;
          feedback.textContent = "정답을 똑같이 한 번씩 써주세요.";
        }
        firstWrongInput.focus();
        firstWrongInput.select();
        return;
      }

      wrongIds.forEach((id) => {
        const word = state.words.find((item) => item.id === id);
        word.stage2Count = 0;
        word.stage2Pass = false;
        word.stage2ReviewNeeded = true;
      });
      saveData();
      startStage2(wrongIds, true, wrongIds);
    }

    function blockPasteInput(input, feedback) {
      if (!input) return;
      const showMessage = () => {
        if (!feedback) return;
        feedback.hidden = false;
        feedback.textContent = "붙여넣기 없이 직접 써보세요.";
      };
      ["paste", "drop"].forEach((eventName) => {
        input.addEventListener(eventName, (event) => {
          event.preventDefault();
          showMessage();
        });
      });
      input.addEventListener("beforeinput", (event) => {
        if (event.inputType === "insertFromPaste" || event.inputType === "insertFromDrop") {
          event.preventDefault();
          showMessage();
        }
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    $("selectKitae").addEventListener("click", () => selectStudent("kitae"));
    $("selectSiyoon").addEventListener("click", () => selectStudent("siyoon"));
    $("changeStudentBtn").addEventListener("click", changeStudent);
    $("startDayBtn").addEventListener("click", startSelectedDay);
    $("managerBtn").addEventListener("click", renderManager);
    $("backupBtn").addEventListener("click", exportBackup);
    $("restoreBtn").addEventListener("click", () => $("restoreFile").click());
    $("restoreFile").addEventListener("change", importBackupFile);
    $("managerBackBtn").addEventListener("click", renderHome);
    $("addWordBtn").addEventListener("click", addWord);
    $("stage1ToStage2").addEventListener("click", () => startStage2(state.stage1LimitIds, false, null, state.stage1ScopeLabel));
    $("stage1ToStage3").addEventListener("click", () => startStage3(state.stage1LimitIds, state.stage1ScopeLabel));
    $("resetStage1Misses").addEventListener("click", resetStage1MissRecords);
    $("stage2ToStage1").addEventListener("click", () => startStage1("slow", state.stage2LimitIds, state.stage2ScopeLabel));
    $("stage2RestartAllTop").addEventListener("click", restartStage2All);
    $("stage2WeakOnly").addEventListener("click", restartStage2WeakOnly);
    $("stage2TroubleChunks").addEventListener("click", startSpellingTroubleReview);
    $("resetStage2Misses").addEventListener("click", resetStage2MissRecords);
    $("stage2ToStage3").addEventListener("click", () => startStage3(state.stage2LimitIds, state.stage2ScopeLabel));
    $("stage3ToStage2").addEventListener("click", () => startStage2(state.stage3LimitIds, false, null, state.stage3ScopeLabel));
    $("stage3ToStage1").addEventListener("click", () => startStage1("slow", state.stage3LimitIds, state.stage3ScopeLabel));
    $("stage3RestartAllTop").addEventListener("click", restartStage3All);
    $("resetStage3Misses").addEventListener("click", resetStage3WrongRecords);
    $("dayPreset").addEventListener("change", () => {
      $("daySelect").value = $("dayPreset").value;
      renderManagerWords();
    });
    $("daySelect").addEventListener("input", renderManagerWords);
    $("englishInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addWord();
    });
    document.querySelectorAll(".homeBtn").forEach((button) => button.addEventListener("click", renderHome));

    loadData();
    if (state.activeStudent) renderHome();
    else renderStudentScreen();
  </script>
</body>
</html>
