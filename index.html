<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>단어 암기 앱</title>
  <style>
    :root {
      --bg: #f7fbff;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #657189;
      --blue: #2f80ed;
      --blue-soft: #e8f2ff;
      --green: #24a865;
      --green-soft: #e8f8ef;
      --red: #e24b4b;
      --red-soft: #fff0f0;
      --yellow: #ffc857;
      --line: #dbe6f3;
      --shadow: 0 14px 40px rgba(36, 86, 138, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    button, input, select {
      font: inherit;
    }

    button {
      min-height: 60px;
      border: 0;
      border-radius: var(--radius);
      padding: 14px 22px;
      color: #fff;
      background: var(--blue);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 8px 20px rgba(47, 128, 237, 0.18);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    input, select {
      width: 100%;
      min-height: 60px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 13px 16px;
      font-size: 20px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.12);
    }

    .app {
      width: min(100%, 980px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.08;
    }

    h2 {
      font-size: clamp(25px, 3.5vw, 34px);
      line-height: 1.2;
    }

    .muted {
      color: var(--muted);
      font-size: 18px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .actions > button {
      flex: 1 1 220px;
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .student-card {
      min-height: 180px;
      display: grid;
      align-content: center;
      gap: 10px;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
    }

    .student-name {
      font-size: 34px;
      font-weight: 950;
      color: var(--blue);
    }

    .student-desc {
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
    }

    .student-status {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .student-chip {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 18px;
      font-weight: 950;
    }

    .plan-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .plan-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .plan-grid.compact-plan {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .plan-card {
      display: grid;
      align-content: space-between;
      gap: 10px;
      min-height: 160px;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: none;
    }

    div.plan-card {
      cursor: default;
    }

    .plan-card.primary-plan {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .plan-title {
      font-size: 22px;
      font-weight: 950;
    }

    .plan-meta {
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
    }

    .mini-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .mini-actions button {
      min-height: 58px;
      padding: 10px 12px;
      font-size: 17px;
    }

    .backup-status {
      min-height: 32px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
    }

    .secondary {
      background: #6b7890;
      box-shadow: 0 8px 20px rgba(80, 91, 112, 0.15);
    }

    .success {
      background: var(--green);
      box-shadow: 0 8px 20px rgba(36, 168, 101, 0.18);
    }

    .danger {
      background: var(--red);
      box-shadow: 0 8px 20px rgba(226, 75, 75, 0.18);
    }

    .ghost {
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--blue);
      box-shadow: none;
    }

    .day-list {
      display: grid;
      gap: 14px;
    }

    .day-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: left;
      box-shadow: none;
    }

    .day-item.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .day-title {
      font-size: 24px;
      font-weight: 900;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 15px;
      font-weight: 800;
      color: var(--muted);
      background: #eef3f8;
    }

    .badge.done {
      color: #0c7545;
      background: var(--green-soft);
    }

    .stage-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0 18px;
    }

    .stage-pill {
      min-height: 48px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #edf3fa;
      color: var(--muted);
      font-size: 17px;
      font-weight: 900;
      text-align: center;
    }

    .stage-pill.active {
      background: var(--blue);
      color: #fff;
    }

    .stage-pill.done {
      background: var(--green);
      color: #fff;
    }

    .manager-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
    }

    .day-controls {
      display: grid;
      grid-template-columns: minmax(150px, 0.42fr) 1fr;
      gap: 12px;
    }

    .word-list {
      display: grid;
      gap: 10px;
    }

    .word-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 70px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .word-row strong {
      font-size: 21px;
    }

    .word-row span {
      font-size: 20px;
      color: var(--muted);
    }

    .word-row button {
      min-width: 90px;
      min-height: 54px;
      font-size: 17px;
      padding: 10px 14px;
    }

    .correction-row {
      grid-template-columns: minmax(0, 1fr) minmax(170px, 0.55fr) minmax(220px, 0.75fr);
    }

    .correction-row input {
      width: 100%;
    }

    .copy-feedback {
      width: 100%;
      min-height: 48px;
      display: grid;
      align-items: center;
      color: #a31f1f;
      font-size: 18px;
      font-weight: 850;
    }

    .study-wrap {
      display: grid;
      gap: 18px;
    }

    .study-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .nav-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .nav-actions button {
      min-height: 56px;
      font-size: 18px;
      padding: 12px 16px;
    }

    .progress-track {
      height: 14px;
      border-radius: 999px;
      background: #e7eef7;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 220ms ease;
    }

    .flashcard-scene {
      perspective: 1200px;
      min-height: 440px;
    }

    .flashcard {
      position: relative;
      width: 100%;
      min-height: 440px;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      padding: 0;
      transform-style: preserve-3d;
      transition: transform 420ms ease;
      cursor: pointer;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      backface-visibility: hidden;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 28px;
      text-align: center;
      overflow-y: auto;
    }

    .card-face > div {
      width: 100%;
    }

    .card-front {
      background: linear-gradient(180deg, #ffffff 0%, #eef7ff 100%);
    }

    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #ffffff 0%, #ecfff4 100%);
    }

    .korean-large {
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 900;
      line-height: 1.35;
      word-break: keep-all;
    }

    .english-large {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 950;
      line-height: 1.1;
      color: var(--green);
      overflow-wrap: anywhere;
    }

    .pronunciation {
      margin-top: 10px;
      color: var(--blue);
      font-size: 22px;
      font-weight: 850;
    }

    .pos-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .pos-badge {
      display: inline-grid;
      place-items: center;
      min-width: 42px;
      min-height: 34px;
      border-radius: 999px;
      padding: 5px 11px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 17px;
      font-weight: 950;
    }

    .example-box {
      display: grid;
      gap: 6px;
      max-width: 760px;
      margin: 18px auto 0;
      padding: 14px 16px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      text-align: left;
    }

    .example-top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .example-en {
      color: var(--ink);
      font-size: 21px;
      font-weight: 850;
      line-height: 1.35;
    }

    .speaker-btn {
      min-width: 60px;
      min-height: 60px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 24px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .example-ko {
      color: var(--muted);
      font-size: 18px;
      font-weight: 750;
      line-height: 1.35;
    }

    .spelling-box {
      display: grid;
      gap: 10px;
      max-width: 760px;
      margin: 18px auto 0;
      padding: 14px 16px;
      border-radius: var(--radius);
      background: #f8fbff;
      border: 1px solid var(--line);
      text-align: left;
    }

    .spelling-title {
      color: var(--blue);
      font-size: 18px;
      font-weight: 950;
    }

    .spelling-row {
      display: grid;
      grid-template-columns: minmax(74px, auto) minmax(86px, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .sound-label {
      color: var(--muted);
      font-size: 18px;
      font-weight: 900;
    }

    .chunk-text {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border-radius: 999px;
      padding: 5px 14px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 21px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .spelling-practice {
      display: grid;
      gap: 12px;
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      background: #f8fbff;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .spelling-practice-row {
      display: grid;
      grid-template-columns: minmax(72px, auto) minmax(82px, auto) 60px 1fr;
      align-items: center;
      gap: 10px;
    }

    .spelling-practice-row input {
      min-height: 56px;
      font-size: 22px;
      font-weight: 900;
    }

    .spelling-practice-row.recall {
      grid-template-columns: minmax(72px, auto) minmax(82px, auto) 60px 1fr;
    }

    .chunk-mask, .chunk-locked {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .chunk-mask {
      border: 2px dashed #bcd2f3;
      color: var(--muted);
      background: #fff;
    }

    .chunk-locked {
      color: var(--green);
      background: #ecfff5;
      border: 2px solid #bcebd0;
    }

    .spelling-status {
      min-height: 28px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 850;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    .miss-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      margin-bottom: 14px;
      border-radius: 999px;
      padding: 7px 14px;
      background: var(--red-soft);
      color: #a31f1f;
      font-size: 17px;
      font-weight: 900;
    }

    .timer-note {
      min-height: 46px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      padding: 10px 14px;
    }

    .stage-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .voice-note {
      min-height: 34px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
      text-align: center;
    }

    .question-box {
      display: grid;
      gap: 16px;
      padding: 26px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .question-box .korean-large {
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .answer-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    .feedback {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 22px;
      font-weight: 900;
    }

    .feedback button {
      min-height: 54px;
      font-size: 19px;
      padding: 10px 18px;
    }

    .feedback.ok {
      color: #0b7644;
      background: var(--green-soft);
    }

    .feedback.bad {
      color: #a31f1f;
      background: var(--red-soft);
    }

    .test-list {
      display: grid;
      gap: 10px;
    }

    .test-row {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) minmax(220px, 0.9fr);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .test-row.correct {
      background: var(--green-soft);
      border-color: #9adfba;
    }

    .test-row.wrong {
      background: var(--red-soft);
      border-color: #f2aaaa;
    }

    .num {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 950;
    }

    .test-korean {
      min-width: 0;
      font-size: 22px;
      font-weight: 850;
      line-height: 1.3;
      word-break: keep-all;
    }

    .correct-answer {
      margin-top: 7px;
      color: #a31f1f;
      font-size: 17px;
      font-weight: 850;
    }

    .confusion-note {
      border-radius: var(--radius);
      background: #fff7e8;
      color: #8a5a00;
      padding: 12px 14px;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.35;
    }

    .celebration {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #f0fff6 100%);
    }

    .score {
      font-size: clamp(42px, 8vw, 74px);
      color: var(--green);
      font-weight: 950;
    }

    .empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 2px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.65);
      font-size: 20px;
      font-weight: 800;
    }

    @media (max-width: 720px) {
      .app {
        padding: 14px;
      }

      .topbar, .study-header {
        align-items: stretch;
        flex-direction: column;
      }

      .manager-grid, .word-row, .answer-line, .test-row, .spelling-practice-row {
        grid-template-columns: 1fr;
      }

      .spelling-row {
        grid-template-columns: 1fr auto;
      }

      .day-controls {
        grid-template-columns: 1fr;
      }

      .student-grid, .plan-grid {
        grid-template-columns: 1fr;
      }

      .stage-actions {
        grid-template-columns: 1fr;
      }

      .day-item {
        grid-template-columns: 1fr;
      }

      .test-row {
        gap: 12px;
      }

      .flashcard-scene, .flashcard {
        min-height: 430px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="studentScreen" class="screen active" aria-labelledby="studentTitle">
      <div class="topbar">
        <div>
          <h1 id="studentTitle">누가 공부할까요?</h1>
          <p class="muted">단어장은 함께 쓰고, 진도는 각자 따로 저장돼요.</p>
        </div>
      </div>

      <div class="student-grid">
        <button id="selectKitae" class="student-card" data-student="kitae">
          <span class="student-name">기태</span>
          <span class="student-desc">10개씩 구간을 나눠서 차근차근 외워요.</span>
        </button>
        <button id="selectSiyoon" class="student-card" data-student="siyoon">
          <span class="student-name">시윤</span>
          <span class="student-desc">한 과 25개를 한 번에 쭉 외워요.</span>
        </button>
      </div>
    </section>

    <section id="homeScreen" class="screen" aria-labelledby="homeTitle">
      <div class="topbar">
        <div>
          <h1 id="homeTitle">단어 암기 앱</h1>
          <p id="homeSubtitle" class="muted">Day별 단어를 3단계로 차근차근 외워요.</p>
        </div>
        <div class="student-status">
          <span id="currentStudentBadge" class="student-chip"></span>
          <button id="changeStudentBtn" class="ghost">학생 바꾸기</button>
        </div>
      </div>

      <div class="stack">
        <div id="dayList" class="day-list"></div>
        <div id="studyPlanPanel"></div>
        <div class="actions">

      migrateTextbook31Words();
      syncSeedDayWords(33, sampleWords, {
        "out of order": ["broken"],
        "prevent a from -ing": ["prevent"]
      });
      seedDayWords(34, day34Words);
      seedDayWords(35, day35Words);
      syncSeedDayWords(36, day36Words);
      syncSeedDayWords(37, day37Words);
      syncSeedDayWords(38, day38SiyoonWords);
      syncSeedDayWords(39, day39SiyoonWords);
      syncSeedDayWords(40, day40SiyoonWords);
      syncSeedDayWords(TEXTBOOK_31_DAY, textbook31KitaeWords);
      syncSeedDayWords(TEXTBOOK_32_DAY, textbook32KitaeWords);
      applySeedDetails(33, sampleWords);
      applySeedDetails(34, day34Words);
      applySeedDetails(35, day35Words);
      applySeedDetails(36, day36Words);
      applySeedDetails(37, day37Words);
      applySeedDetails(38, day38SiyoonWords);
      applySeedDetails(39, day39SiyoonWords);
      applySeedDetails(40, day40SiyoonWords);
      applySeedDetails(TEXTBOOK_31_DAY, textbook31KitaeWords);
      applySeedDetails(TEXTBOOK_32_DAY, textbook32KitaeWords);

      const storedProgress = safeJsonParse(localStorage.getItem(PROGRESS_KEY), null);
      const legacyProgress = storedProgress && typeof storedProgress === "object" ? {
        ...defaultProgress(),
        ...storedProgress,
        stage3Results: storedProgress.stage3Results || {}
      } : defaultProgress();
      migrateTextbook31Progress(legacyProgress);

      state.progress = legacyProgress;
      state.studentProgress = normalizeStudentProgressStore(safeJsonParse(localStorage.getItem(STUDENTS_KEY), null));
      Object.values(state.studentProgress).forEach(migrateTextbook31Progress);
      if (!hasAnyStudentProgress(state.studentProgress)) {
        seedStudentsFromLegacyProgress(legacyProgress);
      }
      const savedStudent = localStorage.getItem(ACTIVE_STUDENT_KEY);
      state.activeStudent = STUDENTS[savedStudent] ? savedStudent : null;
      if (state.activeStudent) {
        applyActiveStudentProgress();
      } else {
        state.selectedDay = state.progress.currentDay || 33;
      }
      saveData();
    }

    function seedDayWords(day, entries) {
      const hasDayWords = state.words.some((word) => word.day === Number(day));
      if (hasDayWords) return;
      entries.forEach((entry) => {
        const [korean, english] = entry;
        state.words.push(makeWord(day, korean, english, {
          ...detailsFromEntry(entry),
          partsOfSpeech: getSeedPartsOfSpeech(day, english),
          spellingChunks: getSeedSpellingChunks(day, english)
        }));
      });
    }

    function syncSeedDayWords(day, entries, aliases = {}) {
      const dayNumber = Number(day);
      const existing = state.words.filter((word) => word.day === dayNumber);
      const used = new Set();
      const synced = entries.map((entry) => {
        const [korean, english] = entry;
        const key = String(english || "").toLowerCase();
        const candidates = [key, ...(aliases[key] || []).map((alias) => String(alias).toLowerCase())];
        let word = existing.find((item) => !used.has(item) && candidates.includes(String(item.english || "").toLowerCase()));
        if (!word) word = makeWord(dayNumber, korean, english);
        used.add(word);
        const details = detailsFromEntry(entry);
        word.day = dayNumber;
        word.korean = korean;
        word.english = key;
        word.partsOfSpeech = getSeedPartsOfSpeech(dayNumber, english);
        word.pronunciation = details.pronunciation;
        word.example = details.example;
        word.exampleKo = details.exampleKo;
        word.spellingChunks = getSeedSpellingChunks(dayNumber, english);
        word.students = Array.isArray(details.students) ? details.students : [];
        return word;
      });
      const extras = existing.filter((word) => !used.has(word));
      const nextWords = [];
      let inserted = false;
      state.words.forEach((word) => {
        if (word.day !== dayNumber) {
          nextWords.push(word);
          return;
        }
        if (!inserted) {
          nextWords.push(...synced, ...extras);
          inserted = true;
        }
      });
      if (!inserted) nextWords.push(...synced, ...extras);
      state.words = nextWords;
    }

    function migrateTextbook31Words() {
      const textbookKeys = new Set(textbook31KitaeWords.map((entry) => String(entry[1] || "").toLowerCase()));
      state.words.forEach((word) => {
        const isLegacyTextbook = Number(word.day) === LEGACY_TEXTBOOK_31_DAY
          && textbookKeys.has(String(word.english || "").toLowerCase())
          && (!Array.isArray(word.students) || !word.students.length || word.students.includes("kitae"));
        if (!isLegacyTextbook) return;
        word.day = TEXTBOOK_31_DAY;
        word.students = ["kitae"];
      });
    }

    function migrateTextbook31Progress(progress) {
      if (!progress || typeof progress !== "object") return;
      if (Number(progress.currentDay) === LEGACY_TEXTBOOK_31_DAY) {
        progress.currentDay = TEXTBOOK_31_DAY;
      }
    }

    function applySeedDetails(day, entries) {
      entries.forEach((entry) => {
        const [, english] = entry;
        const details = detailsFromEntry(entry);
        const word = state.words.find((item) => item.day === Number(day) && item.english === english);
        if (!word) return;
        word.partsOfSpeech = getSeedPartsOfSpeech(day, english);
        word.pronunciation = details.pronunciation;
        word.example = details.example;
        word.exampleKo = details.exampleKo;
        word.spellingChunks = getSeedSpellingChunks(day, english);
        word.students = Array.isArray(details.students) ? details.students : [];
      });
    }

    function getSeedPartsOfSpeech(day, english) {
      const key = String(english || "").toLowerCase();
      return [...((partsOfSpeechByDay[Number(day)] || {})[key] || [])];
    }

    function getSeedSpellingChunks(day, english) {
      const key = String(english || "").toLowerCase();
      return ((spellingChunksByDay[Number(day)] || {})[key] || []).map(([sound, chunk]) => ({ sound, chunk }));
    }

    function detailsFromEntry(entry) {
      return {
        pronunciation: entry[2] || "",
        example: entry[3] || "",
        exampleKo: entry[4] || "",
        students: Array.isArray(entry[5]) ? entry[5] : []
      };
    }

    function normalizeWords() {
      state.words = state.words.map((word) => {
        const legacyMissed = word.stage1Missed === true ? 1 : 0;
        const count = Number.isFinite(Number(word.stage1MissCount)) ? Number(word.stage1MissCount) : legacyMissed;
        const legacyStage2Missed = word.stage2Missed === true ? 1 : 0;
        const stage2MissCount = Number.isFinite(Number(word.stage2MissCount)) ? Number(word.stage2MissCount) : legacyStage2Missed;
        return {
          ...word,
          day: Number(word.day),
          partsOfSpeech: Array.isArray(word.partsOfSpeech) ? word.partsOfSpeech : [],
          pronunciation: typeof word.pronunciation === "string" ? word.pronunciation : "",
          example: typeof word.example === "string" ? word.example : "",
          exampleKo: typeof word.exampleKo === "string" ? word.exampleKo : "",
          spellingChunks: Array.isArray(word.spellingChunks) ? word.spellingChunks : [],
          students: Array.isArray(word.students) ? word.students.filter((studentId) => STUDENTS[studentId]) : [],
          stage1Missed: count > 0,
          stage1MissCount: count,
          stage2Missed: stage2MissCount > 0,
          stage2MissCount,
          stage2ReviewNeeded: typeof word.stage2ReviewNeeded === "boolean" ? word.stage2ReviewNeeded : stage2MissCount > 0,
          stage2LastWrongAnswer: typeof word.stage2LastWrongAnswer === "string" ? word.stage2LastWrongAnswer : "",
          spellingTroubleChunks: Array.isArray(word.spellingTroubleChunks)
            ? word.spellingTroubleChunks.map((index) => Number(index)).filter((index) => Number.isInteger(index) && index >= 0)
            : []
        };
      });
    }

    function getDefaultWordProgress() {
      return {
        stage1Pass: false,
        stage1Missed: false,
        stage1MissCount: 0,
        stage2Missed: false,
        stage2MissCount: 0,
        stage2ReviewNeeded: false,
        stage2LastWrongAnswer: "",
        spellingTroubleChunks: [],
        stage2Count: 0,
        stage2Pass: false
      };
    }

    function extractWordProgress(word) {
      const progress = getDefaultWordProgress();
      WORD_PROGRESS_FIELDS.forEach((field) => {
        const value = word[field];
        progress[field] = Array.isArray(value) ? [...value] : value;
      });
      progress.stage1MissCount = Number(progress.stage1MissCount || 0);
      progress.stage2MissCount = Number(progress.stage2MissCount || 0);
      progress.stage2Count = Number(progress.stage2Count || 0);
      progress.stage1Missed = progress.stage1MissCount > 0 || progress.stage1Missed === true;
      progress.stage2Missed = progress.stage2MissCount > 0 || progress.stage2Missed === true;
      progress.spellingTroubleChunks = Array.isArray(progress.spellingTroubleChunks) ? progress.spellingTroubleChunks : [];
      return progress;
    }

    function applyWordProgress(word, progress = {}) {
      const merged = {
        ...getDefaultWordProgress(),
        ...progress
      };
      word.stage1Pass = merged.stage1Pass === true;
      word.stage1MissCount = Number(merged.stage1MissCount || 0);
      word.stage1Missed = word.stage1MissCount > 0 || merged.stage1Missed === true;
      word.stage2Count = Number(merged.stage2Count || 0);
      word.stage2Pass = merged.stage2Pass === true;
      word.stage2MissCount = Number(merged.stage2MissCount || 0);
      word.stage2Missed = word.stage2MissCount > 0 || merged.stage2Missed === true;
      word.stage2ReviewNeeded = merged.stage2ReviewNeeded === true;
      word.stage2LastWrongAnswer = typeof merged.stage2LastWrongAnswer === "string" ? merged.stage2LastWrongAnswer : "";
      word.spellingTroubleChunks = Array.isArray(merged.spellingTroubleChunks)
        ? merged.spellingTroubleChunks.map((index) => Number(index)).filter((index) => Number.isInteger(index) && index >= 0)
        : [];
    }

    function normalizeStudentProgressStore(store) {
      const normalized = {};
      Object.keys(STUDENTS).forEach((studentId) => {
        const source = store && typeof store === "object" && store[studentId] && typeof store[studentId] === "object"
          ? store[studentId]
          : {};
        normalized[studentId] = {
          ...defaultStudentProgress(),
          ...source,
          stage3Results: source.stage3Results && typeof source.stage3Results === "object" ? source.stage3Results : {},
          words: source.words && typeof source.words === "object" ? source.words : {}
        };
      });
      return normalized;
    }

    function hasAnyStudentProgress(store) {
      return Object.keys(STUDENTS).some((studentId) => {
        const progress = store && store[studentId];
        return progress && progress.words && Object.keys(progress.words).length;
      });
    }

    function seedStudentsFromLegacyProgress(legacyProgress = defaultProgress()) {
      Object.keys(STUDENTS).forEach((studentId) => {
        const progress = {
          ...defaultStudentProgress(),
          currentDay: legacyProgress.currentDay || 33,
          currentStage: legacyProgress.currentStage || 1,
          stage3Results: { ...(legacyProgress.stage3Results || {}) },
          words: {}
        };
        state.words.forEach((word) => {
          progress.words[word.id] = extractWordProgress(word);
        });
        state.studentProgress[studentId] = progress;
      });
    }

    function activeStudentInfo() {
      return STUDENTS[state.activeStudent] || null;
    }

    function getActiveStudentProgress() {
      if (!state.activeStudent || !STUDENTS[state.activeStudent]) return null;
      if (!state.studentProgress[state.activeStudent]) {
        state.studentProgress[state.activeStudent] = defaultStudentProgress();
      }
      return state.studentProgress[state.activeStudent];
    }

    function saveActiveStudentProgress() {
      const progress = getActiveStudentProgress();
      if (!progress) return;
      progress.currentDay = Number(state.progress.currentDay || state.selectedDay || 33);
      progress.currentStage = Number(state.progress.currentStage || 1);
      progress.stage3Results = { ...(state.progress.stage3Results || {}) };
      progress.words = progress.words && typeof progress.words === "object" ? progress.words : {};
      state.words.forEach((word) => {
        progress.words[word.id] = extractWordProgress(word);
      });
    }

    function applyActiveStudentProgress() {
      const progress = getActiveStudentProgress();
      if (!progress) return;
      state.progress = {
        ...defaultProgress(),
        currentDay: progress.currentDay || 33,
        currentStage: progress.currentStage || 1,
        stage3Results: progress.stage3Results || {}
      };
      state.selectedDay = state.progress.currentDay || 33;
      state.words.forEach((word) => {
        applyWordProgress(word, progress.words ? progress.words[word.id] : null);
      });
      resetSessionState();
    }

    function resetSessionState() {
      clearStage1Timer();
      stopSpeech();
      state.stage1Queue = [];
      state.stage1Current = null;
      state.stage1SessionIds = [];
      state.stage1Seen = 0;
      state.stage1LimitIds = null;
      state.stage1ScopeLabel = "";
      state.stage2Queue = [];
      state.stage2Current = null;
      state.stage2LimitIds = null;
      state.stage2NextStage3Ids = null;
      state.stage2ScopeLabel = "";
      state.stage3LimitIds = null;
      state.stage3ScopeLabel = "";
      state.spellingReviewQueue = [];
    }

    function saveData() {
      saveActiveStudentProgress();
      localStorage.setItem(STUDENTS_KEY, JSON.stringify(state.studentProgress));
      if (state.activeStudent) localStorage.setItem(ACTIVE_STUDENT_KEY, state.activeStudent);
      localStorage.setItem(WORDS_KEY, JSON.stringify(state.words));
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(state.progress));
    }

    function exportBackup() {
      saveData();
      const payload = {
        app: "korean-english-vocab",
        version: 2,
        exportedAt: new Date().toISOString(),
        activeStudent: state.activeStudent,
        studentProgress: state.studentProgress,
        words: state.words,
        progress: state.progress
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `vocab-progress-${date}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
      setBackupStatus("진도 백업 파일을 만들었어요.");
    }

    function importBackupFile(event) {
      const file = event.target.files && event.target.files[0];
      event.target.value = "";
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(String(reader.result || ""));
          if (!payload || !Array.isArray(payload.words) || !payload.progress || typeof payload.progress !== "object") {
            throw new Error("Invalid backup");
          }
          const ok = confirm("현재 저장된 단어와 진도를 백업 파일 내용으로 바꿀까요?");
          if (!ok) return;

          state.words = payload.words;
          state.progress = {
            ...defaultProgress(),
            ...payload.progress,
            stage3Results: payload.progress.stage3Results || {}
          };
          normalizeWords();
          state.studentProgress = normalizeStudentProgressStore(payload.studentProgress || null);
          if (!hasAnyStudentProgress(state.studentProgress)) {
            seedStudentsFromLegacyProgress(state.progress);
          }
          state.activeStudent = STUDENTS[payload.activeStudent] ? payload.activeStudent : state.activeStudent;
          if (state.activeStudent) applyActiveStudentProgress();
          else state.selectedDay = state.progress.currentDay || 33;
          resetSessionState();
          saveData();
          if (state.activeStudent) renderHome();
          else renderStudentScreen();
          setBackupStatus("진도를 불러왔어요.");
        } catch (error) {
          alert("백업 파일을 읽을 수 없어요.");
        }
      };
      reader.readAsText(file);
    }

    function setBackupStatus(message) {
      const status = $("backupStatus");
      if (!status) return;
      status.textContent = message;
    }

    function wordsForDay(day = state.progress.currentDay) {
      return state.words
        .filter((word) => word.day === Number(day))
        .filter((word) => isWordVisibleForActiveStudent(word))
        .sort((a, b) => state.words.indexOf(a) - state.words.indexOf(b));
    }

    function isWordVisibleForActiveStudent(word) {
      const assignedStudents = Array.isArray(word.students) ? word.students : [];
      if (!state.activeStudent) return true;
      if (state.activeStudent === "kitae") return assignedStudents.includes("kitae");
      if (!assignedStudents.length) return true;
      return assignedStudents.includes(state.activeStudent);
    }

    function wordsForLimit(limitIds = null, day = state.progress.currentDay) {
      const words = wordsForDay(day);
      if (!Array.isArray(limitIds) || !limitIds.length) return words;
      const allowed = new Set(limitIds);
      return words.filter((word) => allowed.has(word.id));
    }

    function getPartWords(day, part) {
      const words = wordsForDay(day);
      if (part === "part1") return words.slice(0, 15);
      if (part === "part2") return words.slice(15, 25);
      return words;
    }

    function getStudySections(day = state.progress.currentDay) {
      const words = wordsForDay(day);
      const sections = [];
      for (let index = 0; index < words.length; index += 10) {
        const sectionWords = words.slice(index, index + 10);
        sections.push({
          index: sections.length,
          label: `${sections.length + 1}구간`,
          range: `${index + 1}~${index + sectionWords.length}번`,
          words: sectionWords,
          ids: sectionWords.map((word) => word.id)
        });
      }
      return sections;
    }

    function getPartIds(day, part) {
      return getPartWords(day, part).map((word) => word.id);
    }

    function daysWithWords() {
      const counts = new Map();
      state.words
        .filter((word) => isWordVisibleForActiveStudent(word))
        .forEach((word) => counts.set(word.day, (counts.get(word.day) || 0) + 1));
      return [...counts.entries()].sort((a, b) => a[0] - b[0]);
    }

    function formatDayLabel(day) {
      return DAY_LABELS[Number(day)] || `Day ${day}`;
    }

    function statsForWords(list) {
      const total = list.length || 1;
      const s1 = list.filter((word) => word.stage1Pass).length;
      const s2 = list.filter((word) => word.stage2Pass).length;
      const stage3Known = list.length && list.every((word) => state.progress.stage3Results[word.id] === true);
      return {
        total: list.length,
        s1,
        s2,
        s1Done: list.length > 0 && s1 === total,
        s2Done: list.length > 0 && s2 === total,
        s3Done: Boolean(stage3Known)
      };
    }

    function dayStats(day) {
      return statsForWords(wordsForDay(day));
    }

    function showScreen(id) {
      if (id !== "stage1Screen") clearStage1Timer();
      if (id !== "stage1Screen") stopSpeech();
      document.querySelectorAll(".screen").forEach((screen) => screen.classList.remove("active"));
      $(id).classList.add("active");
      window.scrollTo(0, 0);
    }

    function renderStudentScreen() {
      showScreen("studentScreen");
    }

    function selectStudent(studentId) {
      if (!STUDENTS[studentId]) return;
      saveActiveStudentProgress();
      state.activeStudent = studentId;
      localStorage.setItem(ACTIVE_STUDENT_KEY, studentId);
      applyActiveStudentProgress();
      saveData();
      renderHome();
    }

    function changeStudent() {
      saveData();
      state.activeStudent = null;
      localStorage.removeItem(ACTIVE_STUDENT_KEY);
      renderStudentScreen();
    }

    function renderStageBar(containerId, activeStage, stats = dayStats(state.progress.currentDay)) {
      const labels = ["1단계", "2단계", "3단계"];
      const done = [stats.s1Done, stats.s2Done, stats.s3Done];
      $(containerId).innerHTML = `
        <div class="stage-bar" aria-label="Stage progress">
          ${labels.map((label, index) => {
            const stage = index + 1;
            const cls = stage === activeStage ? "active" : done[index] ? "done" : "";
            return `<div class="stage-pill ${cls}">${label}</div>`;
          }).join("")}
        </div>
      `;
    }

    function updateStageNavButtons() {
      const stats = dayStats(state.progress.currentDay);
      const words = wordsForDay();
      const stage1WeakCount = getWeakStage1Targets(words).length;
      const stage2WeakCount = getWeakStage2Targets(wordsForDay()).length;
      const spellingTroubleCount = getSpellingTroubleCount(words);
      const stage3WrongCount = getStage3WrongTargets(words).length;
      const stage1ToStage2 = $("stage1ToStage2");
      const stage1ToStage3 = $("stage1ToStage3");
      const stage2ToStage3 = $("stage2ToStage3");
      const stage2WeakOnly = $("stage2WeakOnly");
      const stage2TroubleChunks = $("stage2TroubleChunks");
      const resetStage1Misses = $("resetStage1Misses");
      const resetStage2Misses = $("resetStage2Misses");
      const resetStage3Misses = $("resetStage3Misses");
      if (stage1ToStage2) stage1ToStage2.disabled = !words.length;
      if (stage1ToStage3) stage1ToStage3.disabled = !words.length;
      if (stage2ToStage3) stage2ToStage3.disabled = !words.length;
      if (stage2WeakOnly) {
        stage2WeakOnly.disabled = !stage2WeakCount;
        stage2WeakOnly.textContent = `오답만 (${stage2WeakCount})`;
      }
      if (stage2TroubleChunks) {
        stage2TroubleChunks.disabled = !spellingTroubleCount;
        stage2TroubleChunks.textContent = `헷갈린 조각 (${spellingTroubleCount})`;
      }
      if (resetStage1Misses) {
        resetStage1Misses.disabled = !stage1WeakCount;
        resetStage1Misses.textContent = `1단계 틀린 기록 초기화 (${stage1WeakCount})`;
      }
      if (resetStage2Misses) {
        resetStage2Misses.disabled = !stage2WeakCount;
        resetStage2Misses.textContent = `2단계 틀린 기록 초기화 (${stage2WeakCount})`;
      }
      if (resetStage3Misses) {
        resetStage3Misses.disabled = !stage3WrongCount;
        resetStage3Misses.textContent = `3단계 오답 초기화 (${stage3WrongCount})`;
      }
    }

    function renderHome() {
      if (!state.activeStudent) {
        renderStudentScreen();
        return;
      }
      const student = activeStudentInfo();
      $("homeSubtitle").textContent = student.mode === "split"
        ? "기태는 10개씩 구간을 나눠서 외워요."
        : "시윤이는 한 과 25개를 한 번에 외워요.";
      $("currentStudentBadge").textContent = `${student.name} 학습중`;
      $("startDayBtn").textContent = student.mode === "split" ? "선택한 단어장 계획대로 시작" : "선택한 단어장 전체 학습 시작";
      const days = daysWithWords();
      if (!days.length) {
        $("dayList").innerHTML = `<div class="empty">아직 단어가 없어요. 단어 관리에서 새 Day를 추가하세요.</div>`;
      } else {
        $("dayList").innerHTML = days.map(([day, count]) => {
          const stats = dayStats(day);
          const sections = getStudySections(day);
          const pendingStage2Review = getPendingStage2ReviewTargets(wordsForDay(day)).length;
          const selected = Number(day) === Number(state.selectedDay) ? "selected" : "";
          const statusHtml = student.mode === "split" ? `
                  ${sections.map((section) => {
                    const sectionStats = statsForWords(section.words);
                    return `<span class="badge ${sectionStats.s2Done ? "done" : ""}">${section.label} ${sectionStats.s2}/${sectionStats.total}</span>`;
                  }).join("")}
                  <span class="badge ${stats.s3Done ? "done" : ""}">전체 테스트 ${stats.s3Done ? "완료" : "미완료"}</span>
                ` : `
                  <span class="badge ${stats.s1Done ? "done" : ""}">Stage 1 ${stats.s1}/${stats.total}</span>
                  <span class="badge ${stats.s2Done ? "done" : ""}">Stage 2 ${stats.s2}/${stats.total}</span>
                  <span class="badge ${stats.s3Done ? "done" : ""}">Stage 3 ${stats.s3Done ? "완료" : "미완료"}</span>
                `;
          return `
            <button class="day-item ${selected}" data-day="${day}" aria-pressed="${selected ? "true" : "false"}">
              <div>
                <div class="day-title">${formatDayLabel(day)} - ${count}단어</div>
                <div class="status-row">
                  ${statusHtml}
                  ${pendingStage2Review ? `<span class="badge">2단계 오답 복습 ${pendingStage2Review}개</span>` : ""}
                </div>
              </div>
              <span class="badge">${Number(day) === Number(state.selectedDay) ? "선택됨" : "선택"}</span>
            </button>
          `;
        }).join("");
      }

      document.querySelectorAll(".day-item").forEach((item) => {
        item.addEventListener("click", () => {
          state.selectedDay = Number(item.dataset.day);
          state.progress.currentDay = state.selectedDay;
          saveData();
          renderHome();
        });
      });
      renderStudyPlanPanel();
      showScreen("homeScreen");
    }

    function renderStudyPlanPanel() {
      const student = activeStudentInfo();
      const panel = $("studyPlanPanel");
      if (!student || !panel) return;
      const day = Number(state.selectedDay || state.progress.currentDay || 33);
      const words = wordsForDay(day);
      if (!words.length) {
        panel.innerHTML = "";
        return;
      }
      if (student.mode === "split") {
        const sections = getStudySections(day);
        const all = statsForWords(words);
        panel.innerHTML = `
          <div class="plan-panel stack">
            <div>
              <h3>기태 학습 계획</h3>
              <p class="muted">10개씩 구간을 나눠 학습하고, 시험은 전체 25개를 한 번에 봐요.</p>
            </div>
            <div class="plan-grid compact-plan">
              ${sections.map((section, index) => {
                const sectionStats = statsForWords(section.words);
                return `
                  <button class="plan-card plan-start ${index === 0 ? "primary-plan" : ""}" data-scope="section-${index}">
                    <div>
                      <div class="plan-title">${section.label} 학습</div>
                      <div class="plan-meta">${section.range} · 2단계 ${sectionStats.s2}/${sectionStats.total}</div>
                    </div>
                  </button>
                `;
              }).join("")}
            </div>
            <button class="success plan-start" data-scope="all-test">전체 25개 시험보기 · ${all.s3Done ? "완료" : "미완료"}</button>
          </div>
        `;
      } else {
        const all = statsForWords(words);
        panel.innerHTML = `
          <div class="plan-panel stack">
            <div>
              <h3>시윤 학습 계획</h3>
              <p class="muted">전체 단어를 한 번에 학습해요.</p>
            </div>
            <div class="plan-grid">
              <button class="plan-card primary-plan plan-start" data-scope="all">
                <span class="plan-title">전체 25개 학습</span>
                <span class="plan-meta">1단계 ${all.s1}/${all.total} · 2단계 ${all.s2}/${all.total}</span>
              </button>
              <button class="plan-card plan-start" data-scope="all-test">
                <span class="plan-title">전체 테스트</span>
                <span class="plan-meta">3단계 ${all.s3Done ? "완료" : "미완료"}</span>
              </button>
            </div>
          </div>
        `;
      }
      document.querySelectorAll(".plan-start").forEach((button) => {
        button.addEventListener("click", () => startStudyScope(button.dataset.scope));
      });
    }

    function renderManager() {
      $("dayPreset").innerHTML = [
        `<option value="${TEXTBOOK_31_DAY}">교과서 3-1</option>`,
        `<option value="${TEXTBOOK_32_DAY}">교과서 3-2</option>`,
        ...Array.from({ length: 100 }, (_, index) => {
        const day = index + 1;
        return `<option value="${day}">Day ${day}</option>`;
        })
      ].join("");
      $("dayPreset").value = state.selectedDay;
      $("daySelect").value = state.selectedDay;
      renderManagerWords();
      showScreen("managerScreen");
    }

    function renderManagerWords() {
      const day = Number($("daySelect").value || state.selectedDay || 33);
      state.selectedDay = day;
      if (day >= 1 && day <= 100) $("dayPreset").value = day;
      else if (day === TEXTBOOK_31_DAY) $("dayPreset").value = TEXTBOOK_31_DAY;
      else if (day === TEXTBOOK_32_DAY) $("dayPreset").value = TEXTBOOK_32_DAY;
      $("managerDayTitle").textContent = formatDayLabel(day);
      const list = wordsForDay(day);
      $("managerWordList").innerHTML = list.length ? list.map((word, index) => `
        <div class="word-row">
          <strong>${index + 1}. ${escapeHtml(word.korean)}</strong>
          <span>${escapeHtml(word.english)}</span>
          <button class="danger delete-word" data-id="${word.id}">삭제</button>
        </div>
      `).join("") : `<div class="empty">이 Day에는 아직 단어가 없어요.</div>`;

      document.querySelectorAll(".delete-word").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.id;
          state.words = state.words.filter((word) => word.id !== id);
          delete state.progress.stage3Results[id];
          Object.values(state.studentProgress).forEach((progress) => {
            if (!progress || typeof progress !== "object") return;
            if (progress.words) delete progress.words[id];
            if (progress.stage3Results) delete progress.stage3Results[id];
          });
          saveData();
          renderManagerWords();
        });
      });
    }

    function addWord() {
      const day = Number($("daySelect").value);
      const korean = $("koreanInput").value.trim();
      const english = $("englishInput").value.trim().toLowerCase();
      if (!day || day < 1 || day > 999 || !korean || !english) {
        alert("Day/교과서 번호, Korean, English를 모두 입력하세요.");
        return;
      }
      const students = state.activeStudent ? [state.activeStudent] : [];
      state.words.push(makeWord(day, korean, english, { students }));
      state.selectedDay = day;
      state.progress.currentDay = day;
      $("koreanInput").value = "";
      $("englishInput").value = "";
      $("koreanInput").focus();
      saveData();
      renderManagerWords();
    }

    function startSelectedDay() {
      if (!wordsForDay(state.selectedDay).length) {
        alert("선택한 단어장에 단어가 없어요.");
        return;
      }
      const student = activeStudentInfo();
      if (student && student.mode === "split") {
        startStudyScope(getFirstKitaeScope(state.selectedDay));
        return;
      }
      startStudyScope("all");
    }

    function getFirstKitaeScope(day) {
      const sections = getStudySections(day);
      const firstIncomplete = sections.find((section) => !statsForWords(section.words).s2Done);
      return firstIncomplete ? `section-${firstIncomplete.index}` : "all-test";
    }

    function startStudyScope(scope = "all") {
      if (!state.activeStudent) {
        renderStudentScreen();
        return;
      }
      if (!wordsForDay(state.selectedDay).length) {
        alert("선택한 단어장에 단어가 없어요.");
        return;
      }
      state.progress.currentDay = Number(state.selectedDay);
      const scopeInfo = getScopeInfo(scope, state.progress.currentDay);
      if (scopeInfo.testOnly) {
        startStage3(scopeInfo.ids, scopeInfo.label);
        return;
      }
      const stats = statsForWords(scopeInfo.words);
      const pendingStage2Review = getPendingStage2ReviewTargets(scopeInfo.words);
      if (!stats.s1Done) startStage1("slow", scopeInfo.ids, scopeInfo.label);
      else if (pendingStage2Review.length) startStage2ReviewLoop(pendingStage2Review, scopeInfo.label);
      else if (!stats.s2Done) startStage2(scopeInfo.ids, true, scopeInfo.ids, scopeInfo.label);
      else startStage3(scopeInfo.ids, scopeInfo.label);
    }

    function getScopeInfo(scope = "all", day = state.progress.currentDay) {
      const sectionMatch = String(scope || "").match(/^section-(test-)?(\d+)$/);
      if (sectionMatch) {
        const isTest = Boolean(sectionMatch[1]);
        const section = getStudySections(day)[Number(sectionMatch[2])] || getStudySections(day)[0];
        return {
          scope,
          label: `${section.label} · ${section.range}`,
          ids: section.ids,
          words: section.words,
          testOnly: isTest
        };
      }
      if (scope === "part1") {
        const words = getPartWords(day, "part1");
        return {
          scope,
          label: "파트 1 · 1~15번",
          ids: words.map((word) => word.id),
          words,
          testOnly: false
        };
      }
      if (scope === "part2") {
        const words = getPartWords(day, "part2");
        return {
          scope,
          label: "파트 2 · 16~25번",
          ids: words.map((word) => word.id),
          words,
          testOnly: false
        };
      }
      const words = wordsForDay(day);
      return {
        scope,
        label: "전체 25개",
        ids: null,
        words,
        testOnly: scope === "all-test"
      };
    }

    function startStage1(mode = "slow", limitIds = null, scopeLabel = "") {
      state.progress.currentStage = 1;
      state.stage1Mode = mode;
      state.stage1LimitIds = Array.isArray(limitIds) ? [...limitIds] : null;
      state.stage1ScopeLabel = scopeLabel || "";
      const words = wordsForLimit(state.stage1LimitIds);
      state.stage1Queue = words.filter((word) => !word.stage1Pass).map((word) => word.id);
      state.stage1SessionIds = [...state.stage1Queue];
      state.stage1Seen = words.filter((word) => word.stage1Pass).length;
      saveData();
      showScreen("stage1Screen");
      nextStage1Word();
    }

    function nextStage1Word() {
      clearStage1Timer();
      stopSpeech();
      const words = wordsForLimit(state.stage1LimitIds);
      updateStageNavButtons();
      const sessionWords = getStage1SessionWords();
      const sessionTotal = sessionWords.length || words.length;
      const passed = sessionWords.length ? sessionWords.filter((word) => word.stage1Pass).length : words.filter((word) => word.stage1Pass).length;
      const modeName = getStage1ModeName();
      const scope = state.stage1ScopeLabel ? `${state.stage1ScopeLabel} · ` : "";
      $("stage1Meta").textContent = `${formatDayLabel(state.progress.currentDay)} · ${scope}${modeName} · ${passed}/${sessionTotal}`;
      $("stage1Progress").style.width = `${sessionTotal ? (passed / sessionTotal) * 100 : 0}%`;
      renderStageBar("stage1Bar", 1);

      if (!state.stage1Queue.length) {
        const missBuckets = getStage1MissBuckets(words);
        const weakCount = missBuckets.once + missBuckets.twice + missBuckets.threePlus;
        const doneTitle = state.stage1Mode === "timed" ? "5초 테스트 완료! 🎉" : "1단계 완료! 🎉";
        $("stage1Content").innerHTML = `
          <div class="panel celebration stack">
            <div>
              <div class="score">${doneTitle}</div>
              <p class="muted">다음 복습 방식을 고를 수 있어요.</p>
            </div>
            <div class="actions">
              <button id="restartStage1Slow" class="ghost">천천히 다시 보기</button>
              <button id="restartStage1Timed" class="ghost">5초 테스트</button>
              <button id="restartStage1Weak" class="danger" ${weakCount ? "" : "disabled"}>약한 단어만 보기 (${weakCount})</button>
              <button id="goStage2" class="success">2단계로 이동</button>
            </div>
          </div>
        `;
        $("restartStage1Slow").addEventListener("click", () => restartStage1("slow"));
        $("restartStage1Timed").addEventListener("click", () => restartStage1("timed"));
        $("restartStage1Weak").addEventListener("click", () => restartStage1("weak"));
        $("goStage2").addEventListener("click", () => startStage2(state.stage1LimitIds, true, state.stage1LimitIds, state.stage1ScopeLabel));
        return;
      }

      state.stage1Current = state.stage1Queue.shift();
      const word = state.words.find((item) => item.id === state.stage1Current);
      const isTimedMode = state.stage1Mode === "timed";
      const noteText = isTimedMode ? "5초 안에 알아요를 누르세요" : getStage1ModeNote();
      const missLabel = getStage1MissLabel(word);
      const missBadge = missLabel ? `<div class="miss-badge">${missLabel}</div>` : "";
      const posBadges = getPartOfSpeechBadges(word);
      const studyInfo = getStage1StudyInfo(word);
      $("stage1Content").innerHTML = `
        <div class="flashcard-scene">
          <div id="flashcard" class="flashcard" role="button" tabindex="0" aria-label="카드를 탭하여 한글과 영어 바꾸기">
            <div class="card-face card-front">
              <div>
                ${missBadge}
                <div class="korean-large">${escapeHtml(word.korean)}</div>
                ${posBadges}
                <div class="hint">탭하면 영어가 보여요</div>
              </div>
            </div>
            <div class="card-face card-back">
              <div>
                ${missBadge}
                <div class="english-large">${escapeHtml(word.english)}</div>
                ${posBadges}
                ${studyInfo}
                <div class="hint">다시 탭하면 한글로 돌아가요</div>
              </div>
            </div>
          </div>
        </div>
        <div id="stage1Timer" class="timer-note">${noteText}</div>
        <div id="voiceNote" class="voice-note"></div>
        <div id="stage1Actions" class="stage-actions">
          <button id="listenBtn" class="ghost">영어 듣기</button>
          <button id="knowBtn" class="success">✅ 알아요</button>
          <button id="dontKnowBtn" class="danger">❌ 몰라요</button>
        </div>
      `;
      $("flashcard").addEventListener("click", () => {
        const card = $("flashcard");
        card.classList.toggle("flipped");
        if (card.classList.contains("flipped")) {
          speakWord(word);
        } else {
          speakKorean(word);
        }
      });
      $("flashcard").addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        $("flashcard").click();
      });
      $("listenBtn").addEventListener("click", () => speakWord(word));
      const exampleListenBtn = $("exampleListenBtn");
      if (exampleListenBtn) {
        exampleListenBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          speakExample(word);
        });
      }
      document.querySelectorAll("#stage1Content .chunk-speaker").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          speakSpellingChunk(button.dataset.sound || "");
        });
      });
      if (!canSpeak()) {
        $("listenBtn").disabled = true;
        if (exampleListenBtn) exampleListenBtn.disabled = true;
        document.querySelectorAll("#stage1Content .chunk-speaker").forEach((button) => {
          button.disabled = true;
        });
        $("voiceNote").textContent = "이 브라우저에서는 음성 듣기를 지원하지 않아요.";
      }
      $("knowBtn").addEventListener("click", () => {
        clearStage1Timer();
        stopSpeech();
        word.stage1Pass = true;
        saveData();
        nextStage1Word();
      });
      $("dontKnowBtn").addEventListener("click", () => handleStage1DontKnow(word));
      if (isTimedMode) startStage1Timer(word);
    }

    function getPartOfSpeechBadges(word) {
      if (!word || !Array.isArray(word.partsOfSpeech) || !word.partsOfSpeech.length) return "";
      return `
        <div class="pos-row">
          ${word.partsOfSpeech.map((part) => `<span class="pos-badge">${escapeHtml(part)}</span>`).join("")}
        </div>
      `;
    }

    function getStage1StudyInfo(word) {
      const pronunciation = word.pronunciation ? `<div class="pronunciation">${escapeHtml(word.pronunciation)}</div>` : "";
      const spelling = getSpellingChunksHtml(word);
      const example = word.example ? `
        <div class="example-box">
          <div class="example-top">
            <div class="example-en">${escapeHtml(word.example)}</div>
            <button id="exampleListenBtn" class="ghost speaker-btn" type="button" aria-label="영어 예문 듣기">🔊</button>
          </div>
          ${word.exampleKo ? `<div class="example-ko">${escapeHtml(word.exampleKo)}</div>` : ""}
        </div>
      ` : "";
      return pronunciation || spelling || example ? `${pronunciation}${spelling}${example}` : "";
    }

    function getSpellingChunksHtml(word) {
      const chunks = getSpellingChunks(word);
      if (!chunks.length) return "";
      return `
        <div class="spelling-box">
          <div class="spelling-title">스펠링 쪼개기</div>
          ${chunks.map((item) => `
            <div class="spelling-row">
              <span class="sound-label">${escapeHtml(item.sound)}</span>
              <span class="chunk-text">${escapeHtml(item.chunk)}</span>
              <button class="ghost speaker-btn chunk-speaker" type="button" data-sound="${escapeHtml(item.sound)}" aria-label="${escapeHtml(item.sound)} 듣기">🔊</button>
            </div>
          `).join("")}
        </div>
      `;
    }

    function getSpellingChunks(word) {
      return Array.isArray(word && word.spellingChunks)
        ? word.spellingChunks.filter((item) => item && item.sound && item.chunk)
        : [];
    }

    function canSpeak() {
      return "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    }

    function speakWord(word) {
      if (!word || !canSpeak()) return;
      speakText(word.english, "en-US", "영어 단어를 읽어주는 중이에요.", 1);
    }

    function speakKorean(word) {
      if (!word || !canSpeak()) return;
      speakText(word.korean, "ko-KR", "한글 뜻을 읽어주는 중이에요.", 1);
    }

    function speakExample(word) {
      if (!word || !word.example || !canSpeak()) return;
      speakText(word.example, "en-US", "영어 예문을 읽어주는 중이에요.", 0.9);
    }

    function speakSpellingChunk(sound) {
      if (!sound || !canSpeak()) return;
      speakText(sound, "ko-KR", "소리 조각을 읽어주는 중이에요.", 1.1);
    }

    function speakText(text, lang, message, rate) {
      if (!text || !canSpeak()) return;
      stopSpeech();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = lang;
      utterance.rate = rate;
      utterance.pitch = lang === "ko-KR" ? 0.78 : 1;
      const voice = pickVoice(lang);
      if (voice) utterance.voice = voice;
      const note = $("voiceNote");
      if (note) note.textContent = message;
      utterance.onend = () => {
        const currentNote = $("voiceNote");
        if (currentNote) currentNote.textContent = "";
      };
      utterance.onerror = () => {
        const currentNote = $("voiceNote");
        if (currentNote) currentNote.textContent = "소리를 켜고 다시 눌러보세요.";
      };
      speechSynthesis.speak(utterance);
    }

    function pickVoice(lang) {
      const voices = speechSynthesis.getVoices();
      const exactLang = lang.toLowerCase();
      const language = exactLang.slice(0, 2);
      const exactVoices = voices.filter((item) => item.lang && item.lang.toLowerCase() === exactLang);
      const matchingVoices = voices.filter((item) => item.lang && item.lang.toLowerCase().startsWith(language));
      if (lang === "en-US") {
        const usNameHints = ["samantha", "alex", "ava", "allison", "susan", "tom", "nicky", "joelle", "aaron", "evan", "american"];
        const preferredUsVoice = exactVoices.find((item) => {
          const name = item.name.toLowerCase();
          return usNameHints.some((hint) => name.includes(hint));
        });
        return preferredUsVoice || exactVoices[0] || matchingVoices[0];
      }
      if (lang === "ko-KR") {
        const maleNameHints = ["male", "man", "injoo", "injoon", "joon", "jinho", "minho", "seojun", "seung", "hyun"];
        const maleVoice = exactVoices.find((item) => {
          const name = item.name.toLowerCase();
          return maleNameHints.some((hint) => name.includes(hint));
        });
        if (maleVoice) return maleVoice;
        return exactVoices[0] || matchingVoices[0];
      }
      return matchingVoices[0];
    }

    function stopSpeech() {
      if (canSpeak()) speechSynthesis.cancel();
    }

    function getStage1ModeName() {
      if (state.stage1Mode === "timed") return "5초 테스트";
      if (state.stage1Mode === "weak") return "약한 단어";
      return "천천히 외우기";
    }

    function getStage1SessionWords() {
      if (!state.stage1SessionIds.length) return [];
      return state.stage1SessionIds
        .map((id) => state.words.find((word) => word.id === id))
        .filter(Boolean);
    }

    function getStage1ModeNote() {
      if (state.stage1Mode === "weak") return "가장 많이 틀린 단어부터 다시 확인해요";
      return "시간 제한 없이 천천히 외워요";
    }

    function getStage1MissLabel(word) {
      const count = Number(word.stage1MissCount || 0);
      if (count >= 3) return "3번 이상 틀린 단어";
      if (count > 0) return `${count}번 틀린 단어`;
      return "";
    }

    function getStage1MissBuckets(words = wordsForDay()) {
      return words.reduce((buckets, word) => {
        const count = Number(word.stage1MissCount || 0);
        if (count === 1) buckets.once += 1;
        else if (count === 2) buckets.twice += 1;
        else if (count >= 3) buckets.threePlus += 1;
        return buckets;
      }, { once: 0, twice: 0, threePlus: 0 });
    }

    function startStage1Timer(word) {
      state.stage1SecondsLeft = 5;
      updateStage1TimerText();
      state.stage1Timer = setInterval(() => {
        state.stage1SecondsLeft -= 1;
        updateStage1TimerText();
        if (state.stage1SecondsLeft <= 0) {
          expireStage1KnowButton(word);
        }
      }, 1000);
    }

    function clearStage1Timer() {
      if (state.stage1Timer) {
        clearInterval(state.stage1Timer);
        state.stage1Timer = null;
      }
    }

    function updateStage1TimerText() {
      const timer = $("stage1Timer");
      if (!timer) return;
      timer.textContent = `${state.stage1SecondsLeft}초 안에 알아요를 누르세요`;
    }

    function expireStage1KnowButton(word) {
      if (!word || state.stage1Current !== word.id) return;
      clearStage1Timer();
      const knowBtn = $("knowBtn");
      const timer = $("stage1Timer");
      if (knowBtn) knowBtn.disabled = true;
      if (timer) timer.textContent = "시간 끝! 몰라요를 눌러 다시 볼게요";
    }

    function handleStage1DontKnow(word) {
      if (!word || state.stage1Current !== word.id) return;
      const dontKnowBtn = $("dontKnowBtn");
      if (dontKnowBtn && dontKnowBtn.dataset.next === "true") {
        nextStage1Word();
        return;
      }
      clearStage1Timer();
      word.stage1Missed = true;
      word.stage1MissCount = Number(word.stage1MissCount || 0) + 1;
      state.stage1Queue.push(word.id);
      saveData();
      const flashcard = $("flashcard");
      if (flashcard && flashcard.classList.contains("flipped")) {
        nextStage1Word();
        return;
      }
      revealStage1AnswerForReview();
    }

    function revealStage1AnswerForReview() {
      const flashcard = $("flashcard");
      const knowBtn = $("knowBtn");
      const dontKnowBtn = $("dontKnowBtn");
      const timer = $("stage1Timer");
      if (flashcard) flashcard.classList.add("flipped");
      if (knowBtn) knowBtn.disabled = true;
      if (dontKnowBtn) {
        dontKnowBtn.textContent = "다음";
        dontKnowBtn.dataset.next = "true";
      }
      if (timer) timer.textContent = "영어 단어를 보고 다음으로 넘어가세요";
      const word = state.words.find((item) => item.id === state.stage1Current);
      speakWord(word);
    }

    function restartStage1(mode) {
      const words = wordsForLimit(state.stage1LimitIds);
      const targets = getStage1RestartTargets(mode, words);
      if (!targets.length) return;
      state.stage1Mode = mode;
      targets.forEach((word) => {
        word.stage1Pass = false;
      });
      state.stage1Queue = targets.map((word) => word.id);
      state.stage1SessionIds = [...state.stage1Queue];
      state.stage1Current = null;
      saveData();
      nextStage1Word();
    }

    function getStage1RestartTargets(mode, words) {
      if (mode === "weak") return getWeakStage1Targets(words);
      return words;
    }

    function getWeakStage1Targets(words) {
      return words
        .filter((word) => Number(word.stage1MissCount || 0) > 0)
        .sort((a, b) => Number(b.stage1MissCount || 0) - Number(a.stage1MissCount || 0));
    }

    function resetStage1MissRecords() {
      const targets = getWeakStage1Targets(wordsForDay());
      if (!targets.length) return;
      const ok = confirm(`1단계 틀린 기록 ${targets.length}개를 초기화할까요? 학습 통과 기록은 그대로 둡니다.`);
      if (!ok) return;
      targets.forEach((word) => {
        word.stage1Missed = false;
        word.stage1MissCount = 0;
      });
      saveData();
      updateStageNavButtons();
      const restartWeak = $("restartStage1Weak");
      if (restartWeak) {
        restartWeak.disabled = true;
        restartWeak.textContent = "약한 단어만 보기 (0)";
      }
    }

    function getStage2MissLabel(word) {
      const count = Number(word.stage2MissCount || 0);
      if (count >= 3) return "2단계 3번 이상 틀린 단어";
      if (count > 0) return `2단계 ${count}번 틀린 단어`;
      return "";
    }

    function getWeakStage2Targets(words = wordsForDay()) {
      return words
        .filter((word) => Number(word.stage2MissCount || 0) > 0)
        .sort((a, b) => Number(b.stage2MissCount || 0) - Number(a.stage2MissCount || 0));
    }

    function getSpellingTroubleIndexes(word) {
      return getSelectedChunkIndexes(word, word.spellingTroubleChunks || []);
    }

    function getSpellingTroubleWords(words = wordsForDay()) {
      return words.filter((word) => getSpellingTroubleIndexes(word).length > 0);
    }

    function getSpellingTroubleCount(words = wordsForDay()) {
      return getSpellingTroubleWords(words).reduce((sum, word) => sum + getSpellingTroubleIndexes(word).length, 0);
    }

    function addSpellingTroubles(word, indexes) {
      const validIndexes = getSelectedChunkIndexes(word, indexes);
      if (!validIndexes.length) return;
      word.spellingTroubleChunks = [...new Set([...(word.spellingTroubleChunks || []), ...validIndexes])];
    }

    function clearSpellingTroubles(word, indexes) {
      const done = new Set(getSelectedChunkIndexes(word, indexes));
      word.spellingTroubleChunks = getSpellingTroubleIndexes(word).filter((index) => !done.has(index));
    }

    function resetStage2MissRecords() {
      const targets = getWeakStage2Targets();
      if (!targets.length) return;
      const ok = confirm(`2단계 틀린 기록 ${targets.length}개를 초기화할까요? 2단계 통과 기록은 그대로 둡니다.`);
      if (!ok) return;
      targets.forEach((word) => {
        word.stage2Missed = false;
        word.stage2MissCount = 0;
        word.stage2ReviewNeeded = false;
        word.stage2LastWrongAnswer = "";
        word.spellingTroubleChunks = [];
      });
      state.stage2LimitIds = null;
      state.stage2NextStage3Ids = null;
      saveData();
      updateStageNavButtons();
      if ($("stage2Screen").classList.contains("active")) {
        startStage2(null, false);
      }
    }

    function getPendingStage2ReviewTargets(words = wordsForDay()) {
      return words
        .filter((word) => word.stage2ReviewNeeded === true)
        .sort((a, b) => Number(b.stage2MissCount || 0) - Number(a.stage2MissCount || 0));
    }

    function restartStage2WeakOnly() {
      const targets = getWeakStage2Targets();
      if (!targets.length) return;
      startStage2ReviewLoop(targets);
    }

    function startSpellingTroubleReview() {
      const targets = getSpellingTroubleWords();
      if (!targets.length) return;
      state.progress.currentStage = 2;
      state.spellingReviewQueue = targets.map((word) => word.id);
      saveData();
      showScreen("stage2Screen");
      nextSpellingTroubleWord();
    }

    function nextSpellingTroubleWord() {
      updateStageNavButtons();
      const words = wordsForDay();
      const totalTroubles = getSpellingTroubleCount(words);
      $("stage2Meta").textContent = `${formatDayLabel(state.progress.currentDay)} · 헷갈린 조각 복습 · ${totalTroubles}개 남음`;
      $("stage2Progress").style.width = totalTroubles ? "20%" : "100%";
      renderStageBar("stage2Bar", 2);

      state.spellingReviewQueue = state.spellingReviewQueue.filter((id) => {
        const word = state.words.find((item) => item.id === id);
        return word && getSpellingTroubleIndexes(word).length;
      });

      if (!state.spellingReviewQueue.length) {
        $("stage2Content").innerHTML = `
          <div class="panel celebration stack">
            <div>
              <div class="score">헷갈린 조각 복습 완료! 🎉</div>
              <p class="muted">저장된 스펠링 조각을 모두 다시 맞혔어요.</p>
            </div>
            <div class="actions">
              <button id="troubleReviewHome" class="success">홈으로</button>
              <button id="troubleReviewStage2" class="ghost">2단계로 이동</button>
            </div>
          </div>
        `;
        $("troubleReviewHome").addEventListener("click", renderHome);
        $("troubleReviewStage2").addEventListener("click", () => startStage2(null, false));
        return;
      }

      const word = state.words.find((item) => item.id === state.spellingReviewQueue.shift());
      const indexes = getSpellingTroubleIndexes(word);
      $("stage2Content").innerHTML = `
        <div class="question-box">
          <div class="korean-large">${escapeHtml(word.korean)}</div>
          <div id="stage2Feedback" class="feedback bad">
            <span>헷갈렸던 부분만 다시 써보세요.</span>
            ${getStage2SpellingPracticeHtml(
              word,
              "헷갈린 조각 다시하기",
              "맞은 조각은 보여주고, 저장된 헷갈린 조각만 다시 써보세요.",
              false,
              indexes,
              true
            )}
          </div>
        </div>
      `;
      setupStage2SpellingPractice({
        onComplete: () => {
          clearSpellingTroubles(word, indexes);
          saveData();
          nextSpellingTroubleWord();
        }
      });
    }

    function getStage3WrongTargets(words = wordsForDay()) {
      return words.filter((word) => state.progress.stage3Results[word.id] === false);
    }

    function resetStage3WrongRecords() {
      const targets = getStage3WrongTargets();
      if (!targets.length) return;
      const ok = confirm(`3단계 오답 기록 ${targets.length}개를 초기화할까요? 맞힌 기록은 그대로 둡니다.`);
      if (!ok) return;
      targets.forEach((word) => {
        delete state.progress.stage3Results[word.id];
        if (Number(word.stage2MissCount || 0) === 0) {
          word.stage2ReviewNeeded = false;
          word.stage2LastWrongAnswer = "";
        }
      });
      state.stage3LimitIds = null;
      saveData();
      updateStageNavButtons();
      if ($("stage3Screen").classList.contains("active")) renderStage3();
    }

    function startStage2ReviewLoop(targets = getPendingStage2ReviewTargets(), scopeLabel = "") {
      if (!targets.length) return;
      targets.forEach((word) => {
        word.stage2Count = 0;
        word.stage2Pass = false;
      });
      saveData();
      const ids = targets.map((word) => word.id);
      startStage2(ids, true, ids, scopeLabel || "오답 복습");
    }

    function restartStage2All() {
      const words = wordsForDay();
      words.forEach((word) => {
        word.stage2Count = 0;
        word.stage2Pass = false;
      });
      saveData();
      startStage2(null, false);
    }

    function restartStage3All() {
      wordsForDay().forEach((word) => {
        delete state.progress.stage3Results[word.id];
      });
      state.stage3LimitIds = null;
      saveData();
      startStage3();
    }

    function getStage2WrongHelp(word, answer) {
      if (!answer) return "빈칸으로 제출했어요.";
      const confusedWord = wordsForDay().find((item) => item.id !== word.id && item.english === answer);
      if (confusedWord) {
        return `내 답: ${escapeHtml(answer)} · ${escapeHtml(answer)} = ${escapeHtml(confusedWord.korean)}`;
      }
      return `내 답: ${escapeHtml(answer)}`;
    }

    function startStage2(limitIds = null, autoAdvance = true, nextStage3Ids = null, scopeLabel = "") {
      state.progress.currentStage = 2;
      state.stage2AutoAdvance = autoAdvance;
      state.stage2LimitIds = Array.isArray(limitIds) ? [...limitIds] : null;
      state.stage2NextStage3Ids = Array.isArray(nextStage3Ids) ? [...nextStage3Ids] : null;
      state.stage2ScopeLabel = scopeLabel || "";
      const source = wordsForLimit(state.stage2LimitIds)
        .filter((word) => !word.stage2Pass);
      state.stage2Queue = source.map((word) => word.id);
      state.stage2Locked = false;
      saveData();
      showScreen("stage2Screen");
      nextStage2Word(autoAdvance);
    }

    function nextStage2Word(autoAdvance = true) {
      const words = wordsForDay();
      const targetWords = wordsForLimit(state.stage2LimitIds);
      updateStageNavButtons();
      const passed = targetWords.filter((word) => word.stage2Pass).length;
      const modeLabel = state.stage2ScopeLabel ? `${state.stage2ScopeLabel} · ` : state.stage2LimitIds ? "부분 학습 · " : "";
      $("stage2Meta").textContent = `${formatDayLabel(state.progress.currentDay)} · ${modeLabel}${passed}/${targetWords.length}`;
      $("stage2Progress").style.width = `${targetWords.length ? (passed / targetWords.length) * 100 : 0}%`;
      renderStageBar("stage2Bar", 2);

      const remaining = targetWords.filter((word) => !word.stage2Pass);
      if (!remaining.length || !state.stage2Queue.length) {
        if (remaining.length) state.stage2Queue = remaining.map((word) => word.id);
        if (!state.stage2Queue.length) {
          if (autoAdvance) {
            const nextStage3Ids = state.stage2NextStage3Ids ? [...state.stage2NextStage3Ids] : null;
            const nextScopeLabel = state.stage2ScopeLabel;
            state.stage2LimitIds = null;
            state.stage2NextStage3Ids = null;
            state.stage2ScopeLabel = "";
            startStage3(nextStage3Ids, nextScopeLabel);
            return;
          }
          state.stage2LimitIds = null;
          state.stage2NextStage3Ids = null;
          state.stage2ScopeLabel = "";
          $("stage2Content").innerHTML = `
            <div class="panel celebration stack">
              <div>
                <div class="score">2단계 완료! 🎉</div>
                <p class="muted">연속 2번 정답을 모두 달성했어요.</p>
              </div>
              <div class="actions">
                <button id="restartStage2All" class="ghost">처음부터 다시하기</button>
                <button id="restartStage2Weak" class="danger" ${getWeakStage2Targets(words).length ? "" : "disabled"}>오답 단어만 다시하기 (${getWeakStage2Targets(words).length})</button>
